name: Deploy CKAN Satudata to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -e
            cd /var/www/ckan_satudata

            echo "Sync code with remote..."
            git pull origin main

            echo "Restart and build services..."
            docker compose -f .devcontainer/docker-compose.yml up -d --build

            echo "Cleanup old images..."
            docker image prune -f

            echo "Done."
