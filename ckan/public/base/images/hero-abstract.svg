<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D3748"/>
      <stop offset="100%" stop-color="#185A75"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dd3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7dd3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="800" fill="url(#bg)"/>

  <!-- soft glows -->
  <circle cx="1300" cy="120" r="420" fill="url(#glow1)"/>
  <circle cx="150" cy="700" r="380" fill="url(#glow2)"/>
  <circle cx="850" cy="650" r="300" fill="url(#glow1)"/>

  <!-- flowing abstract waves -->
  <path d="M0,560 C260,460 520,640 800,540 C1080,440 1340,600 1600,500 L1600,800 L0,800 Z"
        fill="#ffffff" opacity="0.04"/>
  <path d="M0,640 C300,560 560,720 880,620 C1140,540 1380,680 1600,600 L1600,800 L0,800 Z"
        fill="#7dd3ee" opacity="0.06"/>
  <path d="M0,80 C320,180 540,10 860,90 C1120,160 1380,40 1600,120 L1600,0 L0,0 Z"
        fill="#38bdf8" opacity="0.06"/>

  <!-- abstract network of nodes and connecting lines -->
  <g stroke="#7dd3ee" stroke-width="1" opacity="0.25">
    <line x1="120" y1="160" x2="340" y2="80"/>
    <line x1="340" y1="80" x2="520" y2="220"/>
    <line x1="520" y1="220" x2="760" y2="120"/>
    <line x1="760" y1="120" x2="980" y2="260"/>
    <line x1="980" y1="260" x2="1220" y2="140"/>
    <line x1="1220" y1="140" x2="1460" y2="240"/>
    <line x1="520" y1="220" x2="620" y2="380"/>
    <line x1="980" y1="260" x2="1080" y2="400"/>
  </g>
  <g fill="#7dd3ee">
    <circle cx="120" cy="160" r="5" opacity="0.7"/>
    <circle cx="340" cy="80" r="4" opacity="0.5"/>
    <circle cx="520" cy="220" r="6" opacity="0.8"/>
    <circle cx="760" cy="120" r="4" opacity="0.5"/>
    <circle cx="980" cy="260" r="6" opacity="0.8"/>
    <circle cx="1220" cy="140" r="4" opacity="0.5"/>
    <circle cx="1460" cy="240" r="5" opacity="0.7"/>
    <circle cx="620" cy="380" r="3" opacity="0.4"/>
    <circle cx="1080" cy="400" r="3" opacity="0.4"/>
  </g>

  <!-- scattered dot grid accent -->
  <g fill="#ffffff" opacity="0.08">
    <circle cx="80" cy="420" r="3"/>
    <circle cx="180" cy="420" r="3"/>
    <circle cx="280" cy="420" r="3"/>
    <circle cx="80" cy="500" r="3"/>
    <circle cx="180" cy="500" r="3"/>
    <circle cx="280" cy="500" r="3"/>
    <circle cx="80" cy="580" r="3"/>
    <circle cx="180" cy="580" r="3"/>
    <circle cx="280" cy="580" r="3"/>
  </g>

  <!-- large translucent rings -->
  <circle cx="1480" cy="650" r="180" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>
  <circle cx="1480" cy="650" r="260" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.05"/>
  <circle cx="200" cy="120" r="120" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>
</svg>
