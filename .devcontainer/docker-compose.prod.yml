services:
  ckan:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      CKAN_SQLALCHEMY_URL: postgresql://ckan_default:${DB_PASSWORD}@db/ckan_default
      CKAN_SITE_URL: https://yourdomain.com
      CKAN_SOLR_URL: http://solr:8983/solr/ckan
      CKAN_REDIS_URL: redis://redis:6379/0
      CKAN_SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - db
      - solr
      - redis
    networks:
      - ckan-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - ckan
    networks:
      - ckan-network

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  db:
    image: postgres:14
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ckan_default
      POSTGRES_DB: ckan_default
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - ckan-network

  solr:
    image: ckan/ckan-solr:2.9-solr8
    restart: always
    volumes:
      - solr-data:/var/solr
    networks:
      - ckan-network

  redis:
    image: redis:alpine
    restart: always
    networks:
      - ckan-network

  datapusher:
    image: ckan/ckan-base-datapusher:0.0.19
    restart: always
    networks:
      - ckan-network

volumes:
  postgres-data:
  solr-data:

networks:
  ckan-network:
    driver: bridge
