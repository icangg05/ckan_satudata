services:
  ckan:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        # [Choice] Python version: 3.10-bookworm
        VARIANT: 3.10-bookworm
        # [Choice] Node.js version: none, lts/*, 16, 14, 12, 10
        NODE_VERSION: "lts/*"
        # On Linux, you may need to update USER_UID and USER_GID below if not your local UID is not 1000.
        USER_UID: 1000
        USER_GID: 1000

    volumes:
      - ..:/workspace:cached
      # - ../ckan_storage:/workspace/ckan_storage # Mount file storage as a volume
      - ../ckan_storage/storage:/workspace/ckan_storage/storage

    # Ganti sleep infinity dengan entrypoint
    command: /entrypoint.sh

    ports:
      - "5000:5000" # expose CKAN on port 5000 (in_container:host)

    # Runs app on the same network as the database container, allows "forwardPorts" in devcontainer.json function.

    # Uncomment the next line to use a non-root user for all processes.
    # user: vscode

    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  db:
    image: postgres:14
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: ckan_default
      POSTGRES_DB: ckan_default
      POSTGRES_PASSWORD: pass
    network_mode: service:ckan
    # Add "forwardPorts": ["5432"] to **devcontainer.json** to forward PostgreSQL locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  solr:
    container_name: solr
    image: ckan/ckan-solr:2.9-solr8
    network_mode: service:ckan
    volumes:
      - solr-data:/var/solr

  redis:
    network_mode: service:ckan
    container_name: redis
    image: redis:alpine

  datapusher:
    container_name: datapusher
    network_mode: service:ckan
    image: ckan/ckan-base-datapusher:0.0.19
    environment:
      - DATAPUSHER_MAX_CONTENT_LENGTH=104857600

volumes:
  postgres-data:
  solr-data:
