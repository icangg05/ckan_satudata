services:
  ckan:
    container_name: ckan_satudata-ckan-1
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    command: /entrypoint.sh
    ports:
      - "5000:5000"
    volumes:
      - ./ckan_storage:/app/storage
      - ./ckan.ini:/app/ckan.ini
      - .:/app
    environment:
      - CKAN_INI=/app/ckan.ini
      - CKAN_SITE_URL=http://ckan_satudata-ckan-1:5000
      - CKAN_STORAGE_PATH=/app/storage
      - POSTGRES_PASSWORD=supersecurepassword123
      - CKAN_DB_PASSWORD=supersecurepassword123
      - DATASTORE_READONLY_PASSWORD=supersecurepassword123
      - CKAN_DATASTORE_WRITE_URL=postgresql://ckan:supersecurepassword123@db/datastore
      - CKAN_DATASTORE_READ_URL=postgresql://datastore_ro:supersecurepassword123@db/datastore
      - CKAN_SQLALCHEMY_URL=postgresql://ckan:supersecurepassword123@db/ckan
      - CKAN_SOLR_URL=http://solr:8983/solr/ckan
      - CKAN_REDIS_URL=redis://redis:6379/1
      - SECRET_KEY=GwbJpO698mQIcHLuSyUtLEFSVgI
      - CKAN_DATAPUSHER_URL=http://datapusher:8800/
    depends_on:
      - db
      - solr
      - redis
      - datapusher
    networks:
      - ckan_network

  db:
    image: postgres:14
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./.devcontainer/postgres-docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: ckan_default
      POSTGRES_DB: ckan_default
      POSTGRES_PASSWORD: pass
    networks:
      - ckan_network

  solr:
    container_name: solr
    image: ckan/ckan-solr:2.9-solr8
    volumes:
      - solr-data:/var/solr
    networks:
      - ckan_network

  redis:
    container_name: redis
    image: redis:alpine
    networks:
      - ckan_network

  datapusher:
    container_name: datapusher
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.datapusher
    environment:
      - DATAPUSHER_MAX_CONTENT_LENGTH=104857600
    # Agar datapusher bisa download file resource dari site_url publik
    # (https://satudata.kendarikota.go.id) dari dalam container, arahkan domain
    # ke gateway host tempat reverse proxy berjalan. Sesuaikan bila proxy Anda
    # tidak di host gateway.
    extra_hosts:
      - "satudata.kendarikota.go.id:host-gateway"
    networks:
      - ckan_network

volumes:
  postgres-data:
  solr-data:

networks:
  ckan_network:
    driver: bridge
